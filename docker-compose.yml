x-runner-common: &runner-common
  image: myoung34/github-runner:latest
  restart: always

  environment: &runner-env
    RUNNER_SCOPE: ${RUNNER_SCOPE:-org}
    ORG_NAME: ${GITHUB_ORG:-}
    REPO_URL: ${GITHUB_REPO_URL:-}
    ACCESS_TOKEN: ${GITHUB_PAT}
    LABELS: ${RUNNER_LABELS:-self-hosted,linux,arm64}
    DISABLE_AUTO_UPDATE: "true"
    EPHEMERAL: "true"
    RUN_AS_ROOT: "false"
    HOST_DOCKER_GID: ${DOCKER_GID:?set DOCKER_GID in .env}

  # Renumber the in-image `docker` group to match the host's docker.sock GID
  # *before* the original entrypoint drops privileges via `gosu runner`. The
  # `runner` user is already a member of the in-image `docker` group, so
  # renaming the group's GID lets it inherit socket access. `group_add` does
  # not work here because gosu calls initgroups(3), which rebuilds the
  # supplementary group list from /etc/group and discards compose's runtime-
  # added GIDs. The wrapper re-execs the image's original entrypoint chain
  # (dumb-init + entrypoint.sh) with the original CMD args.
  #
  # `command:` must be re-specified explicitly because Compose drops the
  # image's default CMD whenever `entrypoint` is overridden.
  entrypoint:
    - /bin/bash
    - -c
    - 'groupmod -o -g "$$HOST_DOCKER_GID" docker && exec /usr/bin/dumb-init /bin/bash /entrypoint.sh "$$@"'
    - --
  command: ["./bin/Runner.Listener", "run", "--startuptype", "service"]

  cap_add:
    - NET_ADMIN
  devices:
    - /dev/net/tun:/dev/net/tun

services:
  runner-1:
    <<: *runner-common
    container_name: github-runner-1
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME:-grunner}-1
      RUNNER_WORKDIR: ${PWD}/runner-1/work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/runner-1:${PWD}/runner-1
      - ${PWD}/cache/nx:${PWD}/runner-1/work/_nx-cache
      - ${PWD}/cache/npm:/home/runner/.npm
      - ${PWD}/cache/pnpm:/home/runner/.local/share/pnpm/store
      - ${PWD}/cache/tool-cache:/opt/hostedtoolcache

  runner-2:
    <<: *runner-common
    container_name: github-runner-2
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME:-grunner}-2
      RUNNER_WORKDIR: ${PWD}/runner-2/work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/runner-2:${PWD}/runner-2
      - ${PWD}/cache/nx:${PWD}/runner-2/work/_nx-cache
      - ${PWD}/cache/npm:/home/runner/.npm
      - ${PWD}/cache/pnpm:/home/runner/.local/share/pnpm/store
      - ${PWD}/cache/tool-cache:/opt/hostedtoolcache
