x-runner-common: &runner-common
  image: myoung34/github-runner:latest
  restart: always

  environment: &runner-env
    RUNNER_SCOPE: ${RUNNER_SCOPE:-org}
    ORG_NAME: ${GITHUB_ORG:-}
    REPO_URL: ${GITHUB_REPO_URL:-}
    ACCESS_TOKEN: ${GITHUB_PAT}
    LABELS: ${RUNNER_LABELS:-self-hosted,linux,arm64}
    DISABLE_AUTO_UPDATE: "true"
    EPHEMERAL: "true"
    RUN_AS_ROOT: "false"

  # Host's docker.sock GID — required so the in-container `runner` user
  # (UID 1001) can talk to the mounted /var/run/docker.sock. The GID varies
  # per host, which is why it lives in .env rather than being hardcoded.
  group_add:
    - "${DOCKER_GID:?set DOCKER_GID in .env}"

  cap_add:
    - NET_ADMIN
  devices:
    - /dev/net/tun:/dev/net/tun

services:
  runner-1:
    <<: *runner-common
    container_name: github-runner-1
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME:-grunner}-1
      RUNNER_WORKDIR: ${PWD}/runner-1/work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/runner-1:${PWD}/runner-1
      - ${PWD}/cache/nx:${PWD}/runner-1/work/_nx-cache
      - ${PWD}/cache/npm:/home/runner/.npm
      - ${PWD}/cache/pnpm:/home/runner/.local/share/pnpm/store
      - ${PWD}/cache/tool-cache:/opt/hostedtoolcache

  runner-2:
    <<: *runner-common
    container_name: github-runner-2
    environment:
      <<: *runner-env
      RUNNER_NAME: ${RUNNER_NAME:-grunner}-2
      RUNNER_WORKDIR: ${PWD}/runner-2/work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${PWD}/runner-2:${PWD}/runner-2
      - ${PWD}/cache/nx:${PWD}/runner-2/work/_nx-cache
      - ${PWD}/cache/npm:/home/runner/.npm
      - ${PWD}/cache/pnpm:/home/runner/.local/share/pnpm/store
      - ${PWD}/cache/tool-cache:/opt/hostedtoolcache
